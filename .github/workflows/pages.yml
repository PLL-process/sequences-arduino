# Donne un nom explicite au workflow.
name: Publier TechnoQuest sur GitHub Pages

# Déclenche le workflow lors d'un push sur la branche principale ou manuellement.
on:
  # Déclenche le workflow après une modification de main.
  push:
    # Limite le déclenchement à la branche main.
    branches: ["main"]
  # Autorise aussi un lancement manuel.
  workflow_dispatch:

# Définit les permissions minimales nécessaires.
permissions:
  # Autorise la lecture du dépôt.
  contents: read
  # Autorise la publication sur GitHub Pages.
  pages: write
  # Autorise l'authentification du déploiement.
  id-token: write

# Évite plusieurs déploiements simultanés.
concurrency:
  # Regroupe les exécutions Pages.
  group: "pages"
  # N'annule pas un déploiement déjà commencé.
  cancel-in-progress: false

# Définit le travail de déploiement.
jobs:
  # Crée le travail unique de publication.
  deploy:
    # Utilise une machine Linux récente.
    runs-on: ubuntu-latest
    # Associe le travail à l'environnement Pages.
    environment:
      # Définit le nom de l'environnement.
      name: github-pages
      # Récupère l'URL publiée.
      url: ${{ steps.deployment.outputs.page_url }}
    # Définit les étapes du travail.
    steps:
      # Récupère le dépôt.
      - name: Récupérer le dépôt
        # Utilise l'action officielle Checkout.
        uses: actions/checkout@v4
      # Configure Pages.
      - name: Configurer GitHub Pages
        # Utilise l'action officielle de configuration.
        uses: actions/configure-pages@v5
      # Prépare les fichiers statiques.
      - name: Préparer le site
        # Utilise l'action officielle d'artefact Pages.
        uses: actions/upload-pages-artifact@v3
        # Définit le dossier à publier.
        with:
          # Publie la racine du dépôt.
          path: "."
      # Déploie les fichiers.
      - name: Déployer le site
        # Définit l'identifiant de l'étape.
        id: deployment
        # Utilise l'action officielle de déploiement.
        uses: actions/deploy-pages@v4
